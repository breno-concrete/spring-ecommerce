spring:
  application:
    name: marketplace-test
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketplace}
    password: ${DB_PASSWORD}
    username: ${DB_USERNAME}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

  jwt:
    secret: ${JWT_SECRET}  # Chave secreta para assinar o token
    expiration: 86400000                 # Tempo de expiração em ms (1 dia)
    refreshExpiration: 604800000         # Tempo refresh token (7 dias)

  springdoc:
    swagger-ui:
      path: /docs
    api-docs:
      path: /api-docs

# Puxa o site real através de uma variável de ambiente no servidor
app:
  cors:
    allowed-origins: ${FRONTEND_URL}