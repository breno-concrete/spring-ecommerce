spring:
  application:
    name: marketplace-test
  mvc:
    problemdetails:
      enabled: true
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false


  jwt:
    secret: ${JWT_SECRET}  # Chave secreta para assinar o token
    expiration: 86400000                 # Tempo de expiração em ms (1 dia)
    refreshExpiration: 604800000         # Tempo refresh token (7 dias)

  springdoc:
    swagger-ui:
      path: /docs
    api-docs:
      path: /api-docs