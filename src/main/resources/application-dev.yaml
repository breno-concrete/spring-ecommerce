spring:
  application:
    name: marketplace-test
  mvc:
    problemdetails:
      enabled: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    fail-on-missing-locations: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:marketplace}
    password: ${DB_PASSWORD}
    username: ${DB_USERNAME}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
# Lista separada por vírgulas dos sites permitidos no desenvolvimento

  jwt:
    secret: ${JWT_SECRET}  # Chave secreta para assinar o token
    expiration: 86400000                 # Tempo de expiração em ms (1 dia)
    refreshExpiration: 604800000         # Tempo refresh token (7 dias)

  springdoc:
    swagger-ui:
      path: /docs
    api-docs:
      path: /api-docs

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:4200

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: TRACE