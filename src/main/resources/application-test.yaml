spring:
  datasource:
    url: jdbc:h2:mem:marketplacetest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false

  jwt:
    secret: ${JWT_SECRET}  # Chave secreta para assinar o token
    expiration: 86400000                 # Tempo de expiração em ms (1 dia)
    refreshExpiration: 604800000         # Tempo refresh token (7 dias)

  springdoc:
    swagger-ui:
      path: /docs
    api-docs:
      path: /api-docs